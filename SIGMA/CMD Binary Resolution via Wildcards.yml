title: CMD Binary Resolution via Wildcards
id: b4680a10-44c8-440b-a3e6-6664e431a588
status: experimental
description: Detects Windows command line obfuscation where 'for' loops use the 'where' or 'dir /b' commands with wildcards to resolve and execute system binaries (LOLBins). This bypasses static string detection for common tools like certutil.exe or powershell.exe.
author: Luís Marques, SIBS Cyberwatch @remotecodeexec
references:
  - https://0xv1n.github.io/LOLGlobs/api/entries.json
date: 2026-02-28
tags:
  - attack.execution
  - attack.t1059.003
  - attack.indirect_command_execution
  - attack.t1202
logsource:
  product: windows
  category: process_creation
detection:
  selection_base:
        # This activity is specific to the Windows Command Processor (cmd.exe)
    Image|endswith: '\cmd.exe'
        # Detects the core components of a 'for /f' loop used for execution
    CommandLine|contains|all:
      - 'for /f '
      - ' do '
  selection_discovery:
        # Looks for the use of 'where' or 'dir' to find files, which are then executed by the loop
    CommandLine|contains:
      - 'where '
      - 'dir /b '
  selection_wildcard:
        # Detects the presence of wildcards, which is the key component of the obfuscation
    CommandLine|contains:
      - '*'
      - '?'
  condition: selection_base and selection_discovery and selection_wildcard
falsepositives:
  - Legitimate administrative scripts might use this combination of commands for dynamic discovery and execution of tools, although it is an uncommon pattern. Scrutinize the discovered and executed binary's name and subsequent actions.
level: medium
